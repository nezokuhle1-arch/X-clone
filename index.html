<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fake-X</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="assets/favicon.png">
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />
    </head>

    <body>
        
        <div class="app-grid">

            <!-- LEFT SIDEBAR -->
            <aside class="left-sidebar" id="sidebar">
                <a href="index.html" class="nav-logo">
                    <img src="assets/x-logo.svg" alt="Fake-X">
                </a>
                
                <nav class="nav-links">
                    <a href="#" class="nav-link active">
                        <span class="material-symbols-rounded">home</span>
                        <span>Home</span>
                    </a>
                    <a href="#" class="nav-link">
                        <span class="material-symbols-rounded">search</span>
                        <span>Explore</span>
                    </a>
                    <a href="#" class="nav-link">
                        <span class="material-symbols-rounded">notifications</span>
                        <span>Notifications</span>
                    </a>
                    <a href="#" class="nav-link">
                        <span class="material-symbols-rounded">chat_bubble</span>
                        <span>Chat</span>
                    </a>
                    <a href="#" class="nav-link">
                        <span class="material-symbols-rounded">robot_2</span>
                        <span>Grok</span>
                    </a>
                    <a href="#" class="nav-link">
                        <span class="material-symbols-rounded">check_circle</span>
                        <span>Premium</span>
                    </a>
                    <a href="#" class="nav-link">
                        <span class="material-symbols-rounded">person</span>
                        <span>Profile</span>
                    </a>
                    <a href="#" class="nav-link">
                        <span class="material-symbols-rounded">more_horiz</span>
                        <span>More</span>
                    </a>
                </nav>

                <button class="tweet-button" id="tweetButton">Post</button>

                <button class="dark-mode-button" id="darkModeButton" aria-label="Toggle dark mode">
                    <span class="material-symbols-rounded">dark_mode</span>
                    <span class="toggle-label">Dark mode</span>
                </button>


                <div class="user-mini">
                    <div class="user-mini-avatar">
                        <img src="assets/profile-picture.jpg" alt="Profile picture">
                    </div>
                    <div class="user-mini-info">
                        <span class="user-mini-name">Nezokuhle Tshukulwana</span>
                        <span class="user-mini-username">@NezokuhleT</span>
                    </div>
                </div>

            </aside>

            <div class="sidebar-divider"></div>
        </div>

    </body>
</html>
