<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Fake X</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
    <script src="login.js" defer></script>
</head>
<body class="login-page-body">

    <!-- Layer 0: full-screen looping video background -->
    <video class="login-video" autoplay muted loop playsinline aria-hidden="true">
        <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260619_191346_9d19d66e-86a4-47f7-8dc6-712c1788c3b2.mp4" type="video/mp4">
    </video>

    <!-- Layer 1: dark gradient so text and card stay readable -->
    <div class="login-overlay" aria-hidden="true"></div>

    <!-- Top bar: brand only -->
    <header class="login-nav">
        <span class="login-nav-brand">Fake X</span>
    </header>

  <main class="login-main">

        <section class="login-hero" aria-label="Welcome">
            <h1 class="login-hero-heading">
                <span class="staggered-fade" data-text="See what's">See what's</span>
                <span class="staggered-fade" data-text="happening now">happening now</span>
            </h1>

            <p class="login-hero-subtitle login-fade-in" style="animation-delay: 1.6s;">
                Join the conversation.<br class="login-hero-br">
                Follow trends, share your thoughts, and see what people are talking about.
            </p>
        </section>

        <!-- Sign-in card -->
        <section class="login-card login-card-glass login-fade-in" style="animation-delay: 2s;" aria-label="Sign in">
            <img src="assets/x-logo.svg" alt="" class="login-logo" width="32" height="32">

            <h2 class="login-heading">Sign in to Fake X</h2>

            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group" id="usernameGroup">
                    <label for="username">Phone, email, or username</label>
                    <input type="text" id="username" name="username" autocomplete="username" placeholder="Phone, email, or username">
                    <span class="error-message" role="alert">Please enter your phone, email, or username.</span>
                </div>

                <div class="form-group" id="passwordGroup">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Password">
                    <span class="error-message" role="alert">Please enter your password.</span>
                </div>

                <button type="submit" class="login-submit-btn">Log in</button>
            </form>

            <p class="login-signup">
                Don't have an account? <a href="#">Sign up</a>
            </p>
        </section>

    </main>

</body>
</html>
